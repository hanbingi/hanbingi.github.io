<!DOCTYPE html>
 
<html lang="en">
 
  
 
<head>
 
  <meta charset="UTF-8">
 
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
 
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 
  <title>寒冰的留言板</title>
 
  <style>
 
    @import url(https://fonts.googleapis.com/css?family=Roboto:400,600);
 
  
 
    body {
      font-family: "Roboto", sans-serif;
 
      height: 100%;
 
      margin-bottom: 50px;
 
      background: cadetblue;
 
    }
 
  
 
    h4 {
      margin: 10px 30px;
 
      text-transform: capitalize;
 
    }
 
  
 
    span.date {
      font-weight: 300;
 
      font-size: 12px;
 
      float: right;
 
      margin-right: 10px;
 
    }
 
  
 
    hr {
      border: 0;
 
      height: 0;
 
      border-top: 1px solid rgba(0, 0, 0, 0.1);
 
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
 
    }
 
  
 
    .container {
      display: flex;
 
      justify-content: center;
 
    }
 
  
 
    .comment-box {
      width: 85%;
 
      margin-top: 50px;
 
      background: #fff;
 
      padding: 5px;
 
      display: flex;
 
      justify-content: center;
 
      flex-direction: column;
 
      border-radius: 5px;
 
    }
 
  
 
    .comment-box p {
      margin: 0 30px 15px;
 
      font-weight: 300;
 
      color: #333;
 
      word-wrap: break-word;
 
      background: #eee;
 
      padding: 2rem 1rem;
 
    }
 
  
 
    .header {
      margin: 15px 20px;
 
      font-size: 27px;
 
      font-weight: 600;
 
    }
 
  
 
    input[type="text"],
 
    textarea {
      margin: 5px 10px;
 
      outline: none;
 
      background: #efefef;
 
      border: 0;
 
      padding: 10px;
 
      border-radius: 5px;
 
    }
 
  
 
    textarea {
      resize: none;
 
      width: 85%;
 
    }
 
  
 
    input[type="text"] {
      width: 50%;
 
      margin-bottom: 15px;
 
    }
 
  
 
    button {
      margin: 12px 0 0 10px;
 
      border: 0;
 
      color: #fff;
 
      background: #298d9f;
 
      padding: 12px 20px 12px 20px;
 
      transition: all 0.2s ease;
 
      border-radius: 5px;
 
    }
 
  
 
    button:hover {
      background: #175763;
 
    }
 
  
 
    button.close {
      background-color: #28256b;
 
    }
 
  
 
    textarea:disabled,
 
    [type="text"]:disabled,
 
    button:disabled {
      background-color: gray;
 
      cursor: not-allowed;
 
    }
 
  
 
    button:disabled:hover {
      background-color: gray;
 
    }
 
  </style>
 
</head>
 
  
 
<body>
 
  <div class="container">
 
    <div class="comment-box">
 
      <button class="close">关闭留言</button>
 
      <div class="comment-form">
 
        <div class="header">留言板</div>
 
        <div>
 
          <input type="text" id="name" placeholder="请输入您的姓名：">
 
        </div>
 
        <div>
 
          <textarea name="" id="comment" cols="30" rows="3" placeholder="请输入您的留言："></textarea>
 
        </div>
 
        <button id="btn-post">留言</button>
 
      </div>
 
      <div>
 
        <h4 class="header">留言列表</h4>
 
        <div id="comments">
 
  
 
        </div>
 
      </div>
 
    </div>
 
  </div>
 
  <script>
 
    let comments = [
 
      {
        name: "hanbing",
 
        comment:
 
          "welcome",
 
        time: "Thu Jan 12 2022",
 
      },
 
      {
        name: "hanbing",
 
        comment: "这是个留言版",
 
        time: "Thu Jan 11 2022",
 
      },
 
    ];
 
  
 
    
 
    let commentsBox = document.querySelector('#comments');
 
    let nameInput = document.querySelector('#name');
 
    let commentInput = document.querySelector('#comment');
 
    let btnSubmit = document.querySelector('#btn-post');
 
    let btnClose = document.querySelector('.close');
 
  
 
    let isClosed = false;
 
    btnClose.onclick = function () {
      if (isClosed) {
        btnClose.innerHTML = '关闭留言';
 
      } else {
        btnClose.innerHTML = '开启留言';
 
      }
 
      nameInput.disabled = !nameInput.disabled;
 
      commentInput.disabled = !commentInput.disabled;
 
      btnSubmit.disabled = !btnSubmit.disabled;
 
      isClosed = !isClosed;
 
    }
 
  
 
    renderComments();
 
  
 
    btnSubmit.onclick = function () {
      let nameStr = nameInput.value.replace(/<(\/?\w+)>/g, "<$1>");
 
      let commentStr = commentInput.value.replace(/<(\/?\w+)>/g, "<$1>");
 
      comments.unshift({
        name: nameStr,
 
        comment: commentStr,
 
        time: new Date(),
 
      })
 
      renderComments();
 
    }
 
  
 
    function renderComments() {
      commentsBox.innerHTML = '';
 
      comments.forEach((item) => {
        commentsBox.insertAdjacentHTML('beforeend',
 
         `
 
            <hr />
 
            <h4>
 
              <span>${item.name}</span>
 
              <span class="date">${item.time}</span>
 
            </h4>
 
            <p>${item.comment}</p>
 
            `)
 
      })
 
    }
 
  </script>
 
</body>
 
  
 
</html>
